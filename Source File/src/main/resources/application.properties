# --- MongoDB (no extra JARs — mongodb-driver-sync in pom.xml is enough; Maven downloads it) ---
# Local: install MongoDB Community Server and run mongod, then use:
mongo.uri=mongodb://localhost:27017
vrbs.mongodb.uri=mongodb://localhost:27017
# Cloud (Atlas): replace with your SRV string, e.g.
# vrbs.mongodb.uri=mongodb+srv://USER:PASSWORD@cluster0.xxxxx.mongodb.net/?retryWrites=true&w=majority
vrbs.mongodb.database=vrbs

# Session timeout (minutes) — aligns with PRD
vrbs.session.timeoutMinutes=15

# Fonts live under assets/ (see vrbs.font.assetsRoot). At runtime we load every .ttf/.otf from assets/fonts/.
# Optional extra list for classpath-only JAR builds (comma-separated filenames under /fonts/):
vrbs.font.files=
# vrbs.font.files=Inter-Regular.ttf,Poppins-Medium.ttf
# Root folder for font paths (relative to process working directory), default: assets
vrbs.font.assetsRoot=assets
# Scan assets/fonts automatically (true = recommended when using the assets folder)
vrbs.font.autoloadFromAssets=true

# Default / recommended window (pixels)
vrbs.ui.window.defaultWidth=1400
vrbs.ui.window.defaultHeight=900
vrbs.ui.window.minWidth=1280
vrbs.ui.window.minHeight=720
